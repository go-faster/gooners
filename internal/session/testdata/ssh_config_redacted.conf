# redacted example based on a real user config
Host *
    User root
    ServerAliveInterval 30
    ServerAliveCountMax 2
    IdentityAgent /run/user/1000/ssh-agent.socket
    IdentitiesOnly yes

# example-device
Host device 10.42.0.98 192.168.1.41
  HostName 10.42.0.98
  # HostName 192.168.1.41
  User user
  IdentityFile ~/.ssh/id_ed25519.pub
  IdentityAgent /run/user/1000/ssh-agent.socket
  IdentitiesOnly yes
  SetEnv TERM=xterm-256color

# another device
# Host spare 10.42.0.44
#   HostName 10.42.0.44
#   User ubuntu
#   IdentityFile ~/.ssh/id_ed25519_aesa
#   IdentitiesOnly yes

# server
Host server
  HostName 10.42.0.1
  User admin

# laptop
Host laptop
  HostName 10.42.0.2
