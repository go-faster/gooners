# Network and kernel hardening sysctl drop-in.
# Copy to /etc/sysctl.d/60-hardening.conf and apply:
#   sysctl -p /etc/sysctl.d/60-hardening.conf
#
# CAUTION:
#   rp_filter=1 (strict) breaks asymmetric routing, multi-WAN, and some CNI plugins.
#   Use rp_filter=2 (loose) if legitimate traffic is being dropped.
#   Do not apply blindly to Kubernetes nodes, VPN hubs, routers, or BGP speakers.

# IPv4 anti-spoofing. Use =2 (loose) if asymmetric routing is expected.
net.ipv4.conf.all.rp_filter = 1
net.ipv4.conf.default.rp_filter = 1

# SYN flood fallback.
net.ipv4.tcp_syncookies = 1

# Disable ICMP redirects and source routing.
net.ipv4.conf.all.accept_redirects = 0
net.ipv4.conf.default.accept_redirects = 0
net.ipv4.conf.all.send_redirects = 0
net.ipv4.conf.default.send_redirects = 0
net.ipv4.conf.all.accept_source_route = 0
net.ipv4.conf.default.accept_source_route = 0

# Log martian packets and ignore broadcast echo.
net.ipv4.icmp_echo_ignore_broadcasts = 1
net.ipv4.conf.all.log_martians = 1
net.ipv4.conf.default.log_martians = 1

# IPv6: harden even if "not in use" — the NIC may still have a reachable v6 address.
net.ipv6.conf.all.accept_redirects = 0
net.ipv6.conf.default.accept_redirects = 0
net.ipv6.conf.all.accept_ra = 0
net.ipv6.conf.default.accept_ra = 0
