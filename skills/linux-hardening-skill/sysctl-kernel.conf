# /etc/sysctl.d/61-kernel-hardening.conf
#
# Kernel self-protection settings for ordinary public-facing hosts.
# Most of these are safe to apply broadly; exceptions are called out inline.
#
# Apply without reboot:
#   sysctl -p /etc/sysctl.d/61-kernel-hardening.conf

# Prevent unprivileged users from reading the kernel ring buffer (dmesg).
# dmesg leaks kernel addresses, driver versions, boot-time config, and loaded
# modules — information useful for targeting kernel exploits.
kernel.dmesg_restrict = 1

# Hide kernel symbol addresses from /proc/kallsyms and similar interfaces
# regardless of privilege level. Value 2 is strictest: even root cannot read
# them. Defeats KASLR bypass techniques that read addresses from these files.
# If you run kprobes or eBPF tooling that needs symbol addresses, use 1 instead.
kernel.kptr_restrict = 2

# Full ASLR: randomise the base address of the stack, VDSO, shared libraries,
# and heap on every exec. Value 2 also randomises the heap (mmap base).
# Makes exploitation significantly harder by removing predictable memory layout.
kernel.randomize_va_space = 2

# Disallow unprivileged BPF (bpf() syscall without CAP_BPF / CAP_SYS_ADMIN).
# Unprivileged BPF has been a prolific kernel exploit surface. Value 2 is
# permanent for the boot session (cannot be re-enabled without reboot).
# Breaks: unprivileged network tracing (tcpdump on some distros), some eBPF
# observability tools run by non-root. Adjust to 1 if tooling requires it.
kernel.unprivileged_bpf_disabled = 2

# Disallow loading a new kernel via kexec after boot. Prevents an attacker
# with root from replacing the running kernel without a firmware-level reboot.
# IRREVERSIBLE until reboot — cannot be unset with sysctl once applied.
# Do not apply on hosts that use kexec for live-update procedures (e.g.,
# some kdump setups or live-patching implementations that rely on kexec).
kernel.kexec_load_disabled = 1

# Prevent hardlink attacks in world-writable directories (e.g. /tmp).
# Without this a low-privilege process can create hardlinks to files owned by
# other users, enabling TOCTOU races that lead to privilege escalation.
fs.protected_hardlinks = 1

# Prevent symlink following in sticky world-writable directories unless the
# symlink owner matches the directory owner or the follower. Closes classic
# /tmp symlink race conditions.
fs.protected_symlinks = 1

# Prevent creating or opening FIFOs in sticky world-writable dirs by a user
# who does not own the directory. Value 2 also restricts privileged processes.
fs.protected_fifos = 2

# Prevent O_CREAT opens of regular files in sticky world-writable dirs by a
# user who does not own the directory. Same attack surface as FIFOs above.
fs.protected_regular = 2
