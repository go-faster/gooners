# /etc/sysctl.d/60-network-hardening.conf
#
# Conservative network hardening for ordinary public-facing hosts.
# Do NOT apply blindly to routers, VPN hubs, Kubernetes nodes, BGP speakers,
# VRRP members, or any host with asymmetric routing — several of these settings
# will break those workloads.
#
# Apply without reboot:
#   sysctl -p /etc/sysctl.d/60-network-hardening.conf

# SYN cookies: on SYN flood the kernel sends a cookie in SYN-ACK without
# allocating state; the real client proves itself on ACK. Zero cost under normal
# traffic; no downside for a server.
net.ipv4.tcp_syncookies = 1

# ICMP redirect messages let a router tell the host to use a different next-hop.
# An attacker on the local segment can use them to reroute traffic through a
# malicious gateway. Not needed on a non-router.
net.ipv4.conf.all.accept_redirects = 0
net.ipv4.conf.default.accept_redirects = 0
net.ipv4.conf.all.send_redirects = 0
net.ipv4.conf.default.send_redirects = 0

# Source routing lets the packet sender dictate the route through the network,
# bypassing firewall and routing policy. Universally disabled on servers.
net.ipv4.conf.all.accept_source_route = 0
net.ipv4.conf.default.accept_source_route = 0

# Log packets arriving with source addresses that are impossible given the routing
# table (RFC 1918 from WAN, loopback on external, etc.). Useful for detecting
# spoofing and misconfiguration. Can be noisy on ISP-facing uplinks.
net.ipv4.conf.all.log_martians = 1
net.ipv4.conf.default.log_martians = 1

# Reverse Path Filtering: drop incoming packets whose source address would not
# route back out the same interface. Defeats IP spoofing on single-homed hosts.
# BREAKS asymmetric routing, multi-WAN, some VPN topologies, and Kubernetes CNI.
# Use rp_filter=2 (loose mode) if strict mode causes drops on legitimate traffic.
net.ipv4.conf.all.rp_filter = 1
net.ipv4.conf.default.rp_filter = 1

# Ignore broadcast pings. Prevents the host from being used as a Smurf
# amplifier (ICMP broadcast flood to reflect/amplify DDoS).
net.ipv4.icmp_echo_ignore_broadcasts = 1

# --- IPv6 ---
# Apply even if IPv6 is "not in use": the interface is still reachable over v6
# unless it is explicitly disabled, and router advertisements can auto-configure
# addresses without any manual setup.

# Same rationale as IPv4 redirects above.
net.ipv6.conf.all.accept_redirects = 0
net.ipv6.conf.default.accept_redirects = 0

# Same rationale as IPv4 source routing above.
net.ipv6.conf.all.accept_source_route = 0
net.ipv6.conf.default.accept_source_route = 0

# Set to 1 to disable IPv6 entirely on this host. Do this only if no service
# uses v6 and the network does not require it. A dual-stack host that only
# listens on v4 is still reachable via v6 if the NIC has a v6 address.
net.ipv6.conf.all.disable_ipv6 = 0
