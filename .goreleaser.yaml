version: 2
project_name: gooners

builds:
  - id: ssh-mcp
    main: ./cmd/ssh-mcp
    binary: ssh-mcp
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    mod_timestamp: "{{ .CommitTimestamp }}"
    goos:
      - linux
    goarch:
      - amd64
      - arm64

  - id: grafana-dashboard-mcp
    main: ./cmd/grafana-dashboard-mcp
    binary: grafana-dashboard-mcp
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    mod_timestamp: "{{ .CommitTimestamp }}"
    goos:
      - linux
    goarch:
      - amd64
      - arm64

  - id: mcpgateway
    main: ./cmd/mcpgateway
    binary: mcpgateway
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    mod_timestamp: "{{ .CommitTimestamp }}"
    goos:
      - linux
    goarch:
      - amd64
      - arm64

  - id: opencode-handoff-mcp
    main: ./cmd/opencode-handoff-mcp
    binary: opencode-handoff-mcp
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    mod_timestamp: "{{ .CommitTimestamp }}"
    goos:
      - linux
    goarch:
      - amd64
      - arm64

  - id: alertmanager-mcp
    main: ./cmd/alertmanager-mcp
    binary: alertmanager-mcp
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    mod_timestamp: "{{ .CommitTimestamp }}"
    goos:
      - linux
    goarch:
      - amd64
      - arm64

dockers_v2:
  - id: ssh-mcp
    ids: [ssh-mcp]
    images:
      - "ghcr.io/go-faster/gooners/ssh-mcp"
    tags:
      - "{{ .Version }}"
      - "latest"
    build_args:
      BINARY_NAME: ssh-mcp
    dockerfile: Dockerfile.goreleaser
    # Registry-backed buildx cache: unlike GitHub Actions' cache, it isn't
    # scoped to a ref, so it's actually reusable across releases.
    flags:
      - "--cache-from=type=registry,ref=ghcr.io/go-faster/gooners/ssh-mcp:buildcache"
      - "--cache-to=type=registry,ref=ghcr.io/go-faster/gooners/ssh-mcp:buildcache,mode=max"

  - id: grafana-dashboard-mcp
    ids: [grafana-dashboard-mcp]
    images:
      - "ghcr.io/go-faster/gooners/grafana-dashboard-mcp"
    tags:
      - "{{ .Version }}"
      - "latest"
    build_args:
      BINARY_NAME: grafana-dashboard-mcp
    dockerfile: Dockerfile.goreleaser
    flags:
      - "--cache-from=type=registry,ref=ghcr.io/go-faster/gooners/grafana-dashboard-mcp:buildcache"
      - "--cache-to=type=registry,ref=ghcr.io/go-faster/gooners/grafana-dashboard-mcp:buildcache,mode=max"

  - id: mcpgateway
    ids: [mcpgateway]
    images:
      - "ghcr.io/go-faster/gooners/mcpgateway"
    tags:
      - "{{ .Version }}"
      - "latest"
    build_args:
      BINARY_NAME: mcpgateway
    dockerfile: Dockerfile.goreleaser
    flags:
      - "--cache-from=type=registry,ref=ghcr.io/go-faster/gooners/mcpgateway:buildcache"
      - "--cache-to=type=registry,ref=ghcr.io/go-faster/gooners/mcpgateway:buildcache,mode=max"

  - id: opencode-handoff-mcp
    ids: [opencode-handoff-mcp]
    images:
      - "ghcr.io/go-faster/gooners/opencode-handoff-mcp"
    tags:
      - "{{ .Version }}"
      - "latest"
    build_args:
      BINARY_NAME: opencode-handoff-mcp
    dockerfile: Dockerfile.goreleaser
    flags:
      - "--cache-from=type=registry,ref=ghcr.io/go-faster/gooners/opencode-handoff-mcp:buildcache"
      - "--cache-to=type=registry,ref=ghcr.io/go-faster/gooners/opencode-handoff-mcp:buildcache,mode=max"

  - id: alertmanager-mcp
    ids: [alertmanager-mcp]
    images:
      - "ghcr.io/go-faster/gooners/alertmanager-mcp"
    tags:
      - "{{ .Version }}"
      - "latest"
    build_args:
      BINARY_NAME: alertmanager-mcp
    dockerfile: Dockerfile.goreleaser
    flags:
      - "--cache-from=type=registry,ref=ghcr.io/go-faster/gooners/alertmanager-mcp:buildcache"
      - "--cache-to=type=registry,ref=ghcr.io/go-faster/gooners/alertmanager-mcp:buildcache,mode=max"

archives:
  - formats: tar.gz
    name_template: >-
      {{ .ProjectName }}_
      {{- title .Os }}_
      {{- if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
      {{- if .Arm }}v{{ .Arm }}{{ end }}
    builds_info:
      group: root
      owner: root
    files:
      - README.md
      - LICENSE

release:
  github:
    owner: go-faster
    name: gooners
  mode: replace
  draft: false
  prerelease: auto
  footer: |
    ## Docker images

    ```
    ghcr.io/go-faster/gooners/ssh-mcp:v{{ .Version }}
    ghcr.io/go-faster/gooners/grafana-dashboard-mcp:v{{ .Version }}
    ghcr.io/go-faster/gooners/mcpgateway:v{{ .Version }}
    ghcr.io/go-faster/gooners/opencode-handoff-mcp:v{{ .Version }}
    ghcr.io/go-faster/gooners/alertmanager-mcp:v{{ .Version }}
    ```

signs:
  - cmd: cosign
    signature: "${artifact}.sigstore.json"
    args:
      - sign-blob
      - "--bundle=${signature}"
      - "${artifact}"
      - --yes
    artifacts: checksum

sboms:
  - id: archive
    artifacts: archive
  - id: source
    artifacts: source

nfpms:
  - id: ssh-mcp
    package_name: ssh-mcp
    ids: [ssh-mcp]
    homepage: https://github.com/go-faster/gooners
    maintainer: tdakkota <tdakkota@users.noreply.github.com>
    description: SSH MCP server exposing SSH, SFTP, and system tools for agent workflows.
    license: Apache 2.0
    formats: [apk, deb, rpm, archlinux]
    deb:
      lintian_overrides:
        - statically-linked-binary
        - changelog-file-missing-in-native-package

  - id: grafana-dashboard-mcp
    package_name: grafana-dashboard-mcp
    ids: [grafana-dashboard-mcp]
    homepage: https://github.com/go-faster/gooners
    maintainer: tdakkota <tdakkota@users.noreply.github.com>
    description: Grafana dashboard builder MCP server.
    license: Apache 2.0
    formats: [apk, deb, rpm, archlinux]
    deb:
      lintian_overrides:
        - statically-linked-binary
        - changelog-file-missing-in-native-package

  - id: mcpgateway
    package_name: mcpgateway
    ids: [mcpgateway]
    homepage: https://github.com/go-faster/gooners
    maintainer: tdakkota <tdakkota@users.noreply.github.com>
    description: MCP gateway proxy that aggregates multiple upstream MCP servers.
    license: Apache 2.0
    formats: [apk, deb, rpm, archlinux]
    deb:
      lintian_overrides:
        - statically-linked-binary
        - changelog-file-missing-in-native-package

  - id: opencode-handoff-mcp
    package_name: opencode-handoff-mcp
    ids: [opencode-handoff-mcp]
    homepage: https://github.com/go-faster/gooners
    maintainer: tdakkota <tdakkota@users.noreply.github.com>
    description: MCP server for delegating coding tasks to opencode agents.
    license: Apache 2.0
    formats: [apk, deb, rpm, archlinux]
    deb:
      lintian_overrides:
        - statically-linked-binary
        - changelog-file-missing-in-native-package

  - id: alertmanager-mcp
    package_name: alertmanager-mcp
    ids: [alertmanager-mcp]
    homepage: https://github.com/go-faster/gooners
    maintainer: tdakkota <tdakkota@users.noreply.github.com>
    description: Alertmanager MCP server for alerts, silences, receivers, and PromQL validation.
    license: Apache 2.0
    formats: [apk, deb, rpm, archlinux]
    deb:
      lintian_overrides:
        - statically-linked-binary
        - changelog-file-missing-in-native-package

checksum:
  name_template: 'checksums.txt'

snapshot:
  version_template: "{{ incpatch .Version }}-next"
